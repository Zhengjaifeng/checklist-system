<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史记录 - 首末件检查表系统</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="nav"></div>
<div class="container">
  <div class="card">
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:16px;">
      <div class="form-group" style="margin-bottom:0;">
        <label>状态</label>
        <select id="fStatus"><option value="">全部</option><option value="submitted">已提交</option><option value="engineering">工程已确认</option><option value="approved">已通过</option><option value="rejected">已驳回</option></select>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>只看我的</label>
        <select id="fMine"><option value="">全部</option><option value="1">是</option></select>
      </div>
      <button class="btn btn-primary" onclick="load()">查询</button>
    </div>
    <table class="data-table">
      <thead><tr><th>ID</th><th>提交人</th><th>状态</th><th>创建时间</th><th>更新时间</th><th>操作</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
const user = requireLogin();
if (user) {
  document.getElementById('nav').innerHTML = renderNav('history');
  load();
}
async function load() {
  const params = new URLSearchParams();
  const status = document.getElementById('fStatus').value;
  const mine = document.getElementById('fMine').value;
  if (status) params.set('status', status);
  if (mine) params.set('created_by', user.id);
  const forms = await api('/api/forms?' + params.toString());
  document.getElementById('tbody').innerHTML = forms.map(f => `<tr>
    <td>${f.id}</td>
    <td>${f.creator_name}(${f.creator_badge})</td>
    <td>${statusBadge(f.status)}</td>
    <td>${f.created_at}</td>
    <td>${f.updated_at}</td>
    <td><a href="/review.html?id=${f.id}" class="btn btn-outline" style="padding:4px 10px;font-size:12px;">查看</a></td>
  </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#999;">暂无记录</td></tr>';
}
</script>
</body>
</html>
