<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 首末件检查表系统</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
  <div class="login-box card">
    <h2>首末件检查表系统</h2>
    <div class="form-group">
      <label>工号</label>
      <input type="text" id="badge" placeholder="输入工号，如 P001" autofocus>
    </div>
    <div id="error" style="color:red;font-size:12px;margin-bottom:10px;display:none;"></div>
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
    <div style="margin-top:16px;font-size:11px;color:#999;text-align:center;">
      测试账号：P001(操作员) / E001(工程师) / Q001(质量) / A001(管理员)
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if (getUser()) location.href = '/index.html';
document.getElementById('badge').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
async function doLogin() {
  const badge_no = document.getElementById('badge').value.trim();
  if (!badge_no) return;
  try {
    const user = await api('/api/auth/login', { method: 'POST', body: { badge_no } });
    localStorage.setItem('user', JSON.stringify(user));
    location.href = '/index.html';
  } catch (e) {
    const el = document.getElementById('error');
    el.textContent = e.message;
    el.style.display = 'block';
  }
}
</script>
</body>
</html>
